<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TraveLog</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#1F3D3A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TraveLog">
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=bbcf39840e4999a45a371a2c7a7bf4d5&autoload=false&libraries=services"></script>
<script>
  window.__gmapsReady = false;
  window.__gmapsCallbacks = [];
  window.initGoogleMap = function(){
    window.__gmapsReady = true;
    window.__gmapsCallbacks.forEach(fn=>fn());
    window.__gmapsCallbacks = [];
  };
  window.onGoogleMapsReady = function(fn){
    if(window.__gmapsReady) fn(); else window.__gmapsCallbacks.push(fn);
  };
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCR6iMQWbTv3IcQxzG5ugtv3huU7P1IYCA&libraries=places&callback=initGoogleMap"></script>
<style>
  :root{
    --ink: #1F3D3A;
    --parchment: #F6F1E7;
    --green: #14B24E;
    --pin-yellow: #FFC53D;
    --gold: #C9A15A;
    --line: #E4DFD2;
    --text-soft: #7C7264;
    --sb-bg: #FFFFFF;
    --sb-input: #F5F3ED;
    --sidebar-width: 340px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--parchment);color:var(--ink);}
  #app{display:flex;height:100vh;overflow:hidden;position:relative;}
 
  /* ---------- Sidebar ---------- */
  #sidebar{
    width:var(--sidebar-width);min-width:220px;max-width:640px;
    background:var(--sb-bg);
    color:var(--ink);
    display:flex;flex-direction:column;
    height:100%;
    border-right:1px solid var(--line);
    transition: width .25s ease, min-width .25s ease;
    overflow:hidden;
    position:relative;
  }
  #sidebar.resizing{ transition:none; }
  #sidebar.collapsed{ width:0; min-width:0; border-right:none; }
  #sidebarInner{ width:var(--sidebar-width); height:100%; display:flex; flex-direction:column; flex-shrink:0; }
 
  #sidebarResizeHandle{
    position:absolute; top:0; right:-3px; width:6px; height:100%;
    cursor:col-resize; z-index:500; background:transparent;
  }
  #sidebarResizeHandle:hover, #sidebarResizeHandle.active{ background:var(--gold); opacity:0.5; }
  #sidebar.collapsed #sidebarResizeHandle{ display:none; }
 
  #toggleSidebarBtn{
    position:absolute; top:18px; left:16px; z-index:1000;
    width:32px;height:32px;border-radius:50%;
    background:var(--sb-bg);color:var(--ink);border:1px solid var(--line);
    cursor:pointer;font-size:15px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
  }
  #toggleSidebarBtn:hover{border-color:var(--gold);}
  #brand{
    padding:22px 20px 14px 58px;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  #brand h1{
    font-family:Georgia,'Times New Roman',serif;
    font-size:26px;margin:0 0 4px 0;letter-spacing:0.5px;font-weight:600;color:var(--ink);
  }
  #brand p{margin:0;font-size:12.5px;color:var(--text-soft);line-height:1.5;}
 
  #browseView{
    padding:14px 20px;
    display:flex;flex-direction:column;gap:8px;
    flex:1;overflow-y:auto;
  }
 
  /* ---------- Detail view (카테고리 상세) ---------- */
  #detailView{
    display:none;flex-direction:column;flex:1;overflow:hidden;
    padding:14px 20px 0 20px;
  }
  #detailBreadcrumb{flex-shrink:0;margin-bottom:10px;}
  .breadcrumbBack{
    font-size:12px;color:var(--text-soft);cursor:pointer;padding:2px 0;
  }
  .breadcrumbBack:hover{color:var(--gold);}
  .breadcrumbCurrent{
    font-family:Georgia,'Times New Roman',serif;
    font-size:20px;font-weight:600;color:var(--ink);margin-top:2px;
    display:flex;align-items:center;gap:8px;
  }
  #countTextWrap{font-size:11px;color:var(--text-soft);flex-shrink:0;margin:8px 0 6px 0;}
 
  /* ---------- Category list ---------- */
  .catList{display:flex;flex-direction:column;gap:6px;}
  .catListItem{
    border:1px solid var(--line);border-radius:8px;background:var(--sb-input);
  }
  .catListItem.active{border-color:var(--gold);background:var(--gold);}
  .catRowLine{
    display:flex;align-items:center;gap:8px;padding:8px 10px;
    line-height:1.3;min-height:20px;border-radius:8px;
  }
  .catNameArea{display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;}
  .dragHandle{cursor:grab;opacity:0.4;font-size:13px;padding:0 1px;flex-shrink:0;}
  .dragHandle:hover{opacity:0.9;}
  .dragHandle:active{cursor:grabbing;}
  .catListItem.dragOver{border-color:var(--gold);background:#EFE9D8;}
  .groupHeader.dragOver{background:#EFE9D8;}
  .catListItem.active .catRowLine{color:#fff;}
  .catEmoji{
    font-size:17px;flex-shrink:0;line-height:1;
    font-family:'Segoe UI Emoji','Noto Color Emoji','Apple Color Emoji',sans-serif;
  }
  .catLabel{font-size:13px;font-weight:600;line-height:1.4;white-space:nowrap;}
  .catMemoInline{
    flex:1;min-width:0;background:rgba(255,255,255,0.6);border:1px solid var(--line);
    border-radius:5px;padding:5px 8px;font-size:11.5px;color:var(--ink);outline:none;
  }
  .catListItem.active .catMemoInline{background:rgba(255,255,255,0.85);}
  .catMemoInline::placeholder{color:#a8a091;}
  .catMemoInline:focus{border-color:var(--gold);}
  .catCtrls{display:flex;gap:2px;flex-shrink:0;}
  .catCtrlBtn{background:none;border:none;cursor:pointer;font-size:11px;color:inherit;opacity:0.75;padding:2px 4px;}
  .catCtrlBtn:hover{opacity:1;}
  .catDel:hover{color:#E2723A;}
  .catBadge{font-size:10px;background:rgba(0,0,0,0.08);padding:2px 7px;border-radius:10px;color:var(--text-soft);flex-shrink:0;}
  .catListItem.active .catBadge{background:rgba(255,255,255,0.25);color:#fff;}
 
  .groupBlock{margin-bottom:4px;}
  .groupHeader{
    display:flex;align-items:center;gap:6px;padding:7px 6px;cursor:pointer;
    font-weight:700;font-size:12.5px;color:var(--ink);border-radius:6px;
  }
  .groupHeader:hover{background:var(--sb-input);}
  .groupHeader.ungroupedHeader{cursor:default;color:var(--text-soft);font-weight:600;}
  .groupHeader.ungroupedHeader:hover{background:none;}
  .groupArrow{width:14px;flex-shrink:0;font-size:10px;text-align:center;}
  .groupName{flex:1;word-break:break-word;}
  .groupCtrls{display:flex;gap:2px;flex-shrink:0;}
  .groupChildren{display:flex;flex-direction:column;gap:6px;padding-left:16px;margin:4px 0 4px 0;border-left:2px solid var(--line);}
  .addCatRow .catNameArea{color:var(--text-soft);}
  .addCatRow{border-style:dashed;}
  .addCatRow .catNameArea:hover{color:var(--ink);}
 
  .searchRow{display:flex;gap:6px;}
  .searchRow input{
    flex:1;background:var(--sb-input);border:1px solid var(--line);
    color:var(--ink);padding:9px 10px;border-radius:6px;font-size:13.5px;outline:none;
  }
  .searchRow input::placeholder{color:#a8a091;}
  .searchRow input:focus{border-color:var(--gold);}
  .searchRow button{
    background:var(--gold);border:none;color:#fff;
    border-radius:6px;padding:0 12px;cursor:pointer;font-size:14px;
  }
  .searchRow button:hover{background:#b98d45;}
  #searchResults{display:flex;flex-direction:column;gap:4px;}
  .searchItem{
    background:var(--sb-input);border:1px solid var(--line);
    border-radius:6px;padding:6px 8px;cursor:pointer;
  }
  .searchItem:hover{border-color:var(--gold);background:#EFE9D8;}
  .searchName{font-size:12.5px;font-weight:600;}
  .searchAddr{font-size:10.5px;color:var(--text-soft);margin-top:1px;}
  .searchEmpty{font-size:12px;color:var(--text-soft);padding:4px 2px;}
 
  /* ---------- List ---------- */
  #localFilterInput{
    width:100%;background:var(--sb-input);border:1px solid var(--line);
    color:var(--ink);padding:7px 9px;border-radius:6px;font-size:12.5px;outline:none;
    flex-shrink:0;
  }
  #localFilterInput::placeholder{color:#a8a091;}
  #localFilterInput:focus{border-color:var(--gold);}
  #list{flex:1;overflow-y:auto;padding:4px 0 20px 0;}
  .placeCard{
    background:#FCFBF8;
    border:1px solid var(--line);
    border-radius:8px;padding:10px 12px;margin-bottom:8px;
    display:flex;align-items:flex-start;gap:10px;
  }
  .placeCard.visited{opacity:0.65;}
  .pinIcon{font-size:18px;flex-shrink:0;margin-top:1px;cursor:pointer;font-family:'Segoe UI Emoji','Noto Color Emoji','Apple Color Emoji',sans-serif;}
  .cardBody{flex:1;min-width:0;}
  .cardNameArea{cursor:pointer;}
  .cardNameArea:hover .cardName{color:var(--gold);}
  .cardName{font-size:14px;font-weight:600;color:var(--ink);word-break:break-word;}
  .cardMeta{font-size:11px;color:var(--text-soft);margin-top:2px;}
  .cardCatBadges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
  .miniCatBadge{
    font-size:10.5px;background:var(--sb-input);border:1px solid var(--line);
    padding:2px 7px;border-radius:10px;color:var(--text-soft);display:inline-flex;align-items:center;gap:3px;
  }
  .memoBox{
    width:100%;margin-top:6px;background:var(--sb-input);
    border:1px solid var(--line);border-radius:5px;
    color:var(--ink);font-size:12px;padding:5px 7px;
    resize:vertical;min-height:28px;font-family:inherit;
  }
  .memoBox::placeholder{color:#a8a091;}
  .memoBox:focus{outline:none;border-color:var(--gold);}
  .delBtn{background:none;border:none;color:#b08a72;cursor:pointer;font-size:14px;flex-shrink:0;}
  .delBtn:hover{color:#E2723A;}
  .emptyState{color:var(--text-soft);font-size:12.5px;text-align:center;padding:30px 10px;line-height:1.6;}
 
  /* ---------- Map ---------- */
  #map, #mapGoogle{flex:1;height:100%;}
  #mapGoogle{display:none;}
 
  #mapProviderToggle{
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    z-index:999; display:flex; background:#fff; border-radius:999px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2); padding:3px; gap:2px;
  }
  #mapProviderToggle button{
    border:none;background:none;padding:7px 14px;border-radius:999px;
    font-size:12.5px;font-weight:600;color:var(--text-soft);cursor:pointer;
  }
  #mapProviderToggle button.active{background:var(--ink);color:#fff;}
 
  .footPin{
    width:30px;height:30px;border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.35);
    border:2px solid rgba(255,255,255,0.9);
    cursor:pointer;
  }
  .footPin span{transform:rotate(45deg);font-size:14px;font-family:'Segoe UI Emoji','Noto Color Emoji','Apple Color Emoji',sans-serif;}
  .footPin.orange{background:var(--pin-yellow);}
  .footPin.green{background:var(--green);}
 
  /* ---------- Modals ---------- */
  .modalOverlay{
    display:none;position:fixed;inset:0;background:rgba(31,61,58,0.45);
    z-index:2000;align-items:center;justify-content:center;
  }
  .modalBox{
    background:#fff;border-radius:12px;padding:18px;width:270px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
  }
  .modalTitle{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:12px;text-align:center;word-break:break-word;}
  .modalBtn{
    width:100%;padding:10px;border-radius:8px;border:none;font-size:13.5px;
    margin-bottom:8px;cursor:pointer;font-weight:600;
  }
  .visitBtn{background:var(--green);color:#fff;}
  .visitBtn:hover{background:#0f9640;}
  .editCatBtn{background:var(--sb-input);color:var(--ink);border:1px solid var(--line);}
  .editCatBtn:hover{border-color:var(--gold);}
  .deleteBtn{background:#F4DED6;color:#b3401f;}
  .deleteBtn:hover{background:#eecabd;}
  .cancelBtn{background:var(--sb-input);color:var(--text-soft);margin-bottom:0;}
  .cancelBtn:hover{background:#e9e4d8;}
  .catPickRow{display:flex;align-items:center;gap:8px;padding:7px 2px;font-size:13px;cursor:pointer;}
  .catPickRow input{width:16px;height:16px;cursor:pointer;}
  .pickGroupBlock{margin-bottom:2px;}
  .pickGroupHeader{
    display:flex;align-items:center;gap:6px;padding:6px 2px;cursor:pointer;
    font-weight:700;font-size:12.5px;color:var(--ink);
  }
  .pickGroupHeader.ungroupedHeader{cursor:default;color:var(--text-soft);font-weight:600;}
  .pickGroupChildren{display:flex;flex-direction:column;padding-left:18px;margin-bottom:4px;}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebarInner">
    <div id="brand">
      <h1>TraveLog</h1>
      <p>카테고리를 만들고, 장소를 검색해서 담아보세요. 지도의 핀을 누르면 방문/삭제를 고를 수 있어요.</p>
    </div>
 
    <div id="browseView">
      <div class="searchRow">
        <input type="text" id="searchInput" placeholder="🔎 장소 검색 (예: 서울역)" />
        <button id="searchBtn" type="button">검색</button>
      </div>
      <div id="searchResults"></div>
      <div class="catList" id="catRow"></div>
    </div>
 
    <div id="detailView">
      <div id="detailBreadcrumb"></div>
      <input type="text" id="localFilterInput" placeholder="🔍 이 카테고리에서 검색" />
      <div id="countTextWrap"><span id="countText">0</span>개</div>
      <div id="list"></div>
    </div>
    </div>
    <div id="sidebarResizeHandle" title="드래그해서 너비 조절"></div>
  </div>
  <button id="toggleSidebarBtn" title="사이드바 접기/펼치기">☰</button>
  <div id="mapProviderToggle">
    <button id="btnProviderKr" class="active" data-provider="kr">🇰🇷 국내</button>
    <button id="btnProviderIntl" data-provider="intl">🌍 해외</button>
  </div>
  <div id="map"></div>
  <div id="mapGoogle"></div>
</div>
 
<div class="modalOverlay" id="pinActionModal">
  <div class="modalBox">
    <div class="modalTitle" id="modalTitle"></div>
    <button class="modalBtn visitBtn" id="modalVisitBtn"></button>
    <button class="modalBtn editCatBtn" id="modalEditCatBtn">📂 카테고리 변경</button>
    <button class="modalBtn deleteBtn" id="modalDeleteBtn">삭제하기</button>
    <button class="modalBtn cancelBtn" id="modalCancelBtn">취소</button>
  </div>
</div>
 
<div class="modalOverlay" id="catEditModal">
  <div class="modalBox">
    <div class="modalTitle" id="catEditTitle"></div>
    <div id="catEditList" style="margin-bottom:12px;max-height:220px;overflow-y:auto;"></div>
    <button class="modalBtn visitBtn" id="catEditConfirmBtn">저장하기</button>
    <button class="modalBtn cancelBtn" id="catEditCancelBtn">취소</button>
  </div>
</div>
 
<div class="modalOverlay" id="moveGroupModal">
  <div class="modalBox">
    <div class="modalTitle" id="moveGroupTitle"></div>
    <div id="moveGroupList" style="margin-bottom:12px;max-height:220px;overflow-y:auto;text-align:left;"></div>
    <button class="modalBtn visitBtn" id="moveGroupConfirmBtn">이동하기</button>
    <button class="modalBtn cancelBtn" id="moveGroupCancelBtn">취소</button>
  </div>
</div>
 
<div class="modalOverlay" id="newCatGroupModal">
  <div class="modalBox">
    <div class="modalTitle" id="newCatGroupTitle"></div>
    <div id="newCatGroupList" style="margin-bottom:12px;max-height:220px;overflow-y:auto;text-align:left;"></div>
    <button class="modalBtn visitBtn" id="newCatGroupConfirmBtn">만들기</button>
    <button class="modalBtn cancelBtn" id="newCatGroupCancelBtn">취소</button>
  </div>
</div>
 
<div class="modalOverlay" id="catPickModal">
  <div class="modalBox">
    <div class="modalTitle" id="catPickTitle"></div>
    <div id="catPickList" style="margin-bottom:12px;max-height:220px;overflow-y:auto;"></div>
    <button class="modalBtn visitBtn" id="catPickConfirmBtn">추가하기</button>
    <button class="modalBtn cancelBtn" id="catPickCancelBtn">취소</button>
  </div>
</div>
 
<script>
const SUPABASE_URL = 'https://hladgocnwkdobcsxcmqk.supabase.co';
const SUPABASE_KEY = 'sb_publishable__FWBn_--TTx2JgOtuwqyEQ_cnyqW6tw';
 
const DEFAULT_KEYS = ['before_visit','after_visit'];
let CAT_INFO = {};             // { key: {emoji,label,memo,groupId} }
let customCategoryOrder = [];  // 커스텀 카테고리 우선순위 (지도 이모지 결정용)
let GROUPS = {};               // { groupId: {name, collapsed} } - 대카테고리(그룹)
let groupOrder = [];           // 그룹 표시 순서
let places = [];               // {id, name, categories:[], emoji, lat, lng, visited, memo, address, overlay}
let idSeq = 1;
let map;
let googleMap;
let activeProvider = 'kr'; // 'kr' = 카카오맵, 'intl' = 구글맵
let selectedCat = null;        // 목록 필터링용 (보기 전용)
let selectedGroup = null;      // 펼쳐진 그룹 단위 지도 필터
let sidebarView = 'browse';    // 'browse' | 'detail'
let pinActionTargetId = null;
let pendingSearchResult = null;
 
/* ---------- 클라우드(Supabase) 동기화 ---------- */
let cloudSyncTimer = null;
function queueCloudSync(){
  clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(()=>{ pushCloudState().catch(()=>{}); }, 700);
}
 
async function pushCloudState(){
  const state = {
    categories: CAT_INFO,
    categoryOrder: customCategoryOrder,
    groups: GROUPS,
    groupOrder: groupOrder,
    places: places.map(p => ({
      id: p.id, name: p.name, categories: p.categories,
      emoji: p.emoji, lat: p.lat, lng: p.lng, visited: p.visited,
      memo: p.memo || '', address: p.address || ''
    }))
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/travelog_state?on_conflict=id`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates'
    },
    body: JSON.stringify([{ id: 'main', data: state, updated_at: new Date().toISOString() }])
  });
  return res.ok;
}
 
async function fetchCloudState(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/travelog_state?id=eq.main&select=data`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if(!res.ok) return null;
  const rows = await res.json();
  if(!rows.length) return null;
  return rows[0].data;
}
 
/* ---------- 카테고리 저장/불러오기 (로컬) ---------- */
function loadCategories(){
  const raw = localStorage.getItem('categories');
  if(raw){
    try{ CAT_INFO = JSON.parse(raw); } catch(e){ CAT_INFO = {}; }
  }
  // 기존 데이터에 기본 카테고리가 없으면 채워넣음 (신규/구버전 데이터 모두 대응)
  let needsSave = false;
  if(!CAT_INFO.before_visit){ CAT_INFO.before_visit = { emoji:'📍', label:'방문 전', memo:'' }; needsSave = true; }
  if(!CAT_INFO.after_visit){ CAT_INFO.after_visit = { emoji:'✅', label:'방문 후', memo:'' }; needsSave = true; }
  if(needsSave) saveCategories();
}
function saveCategoriesLocal(){ localStorage.setItem('categories', JSON.stringify(CAT_INFO)); }
function saveCategories(){ saveCategoriesLocal(); queueCloudSync(); }
 
function loadCategoryOrder(){
  const raw = localStorage.getItem('categoryOrder');
  if(raw){ try{ customCategoryOrder = JSON.parse(raw); return; } catch(e){} }
  customCategoryOrder = Object.keys(CAT_INFO).filter(k => !DEFAULT_KEYS.includes(k));
  saveCategoryOrder();
}
function saveCategoryOrderLocal(){ localStorage.setItem('categoryOrder', JSON.stringify(customCategoryOrder)); }
function saveCategoryOrder(){ saveCategoryOrderLocal(); queueCloudSync(); }
 
/* ---------- 그룹(대카테고리) 저장/불러오기 (로컬) ---------- */
function loadGroups(){
  const raw = localStorage.getItem('groups');
  if(raw){ try{ GROUPS = JSON.parse(raw); } catch(e){ GROUPS = {}; } }
}
function saveGroupsLocal(){ localStorage.setItem('groups', JSON.stringify(GROUPS)); }
function saveGroups(){ saveGroupsLocal(); queueCloudSync(); }
 
function loadGroupOrder(){
  const raw = localStorage.getItem('groupOrder');
  if(raw){ try{ groupOrder = JSON.parse(raw); return; } catch(e){} }
  groupOrder = Object.keys(GROUPS);
  saveGroupOrder();
}
function saveGroupOrderLocal(){ localStorage.setItem('groupOrder', JSON.stringify(groupOrder)); }
function saveGroupOrder(){ saveGroupOrderLocal(); queueCloudSync(); }
 
/* ---------- 장소 저장/불러오기 (로컬) ---------- */
function saveToStorageLocal(){
  const data = places.map(p => ({
    id: p.id, name: p.name, categories: p.categories,
    emoji: p.emoji, lat: p.lat, lng: p.lng, visited: p.visited,
    memo: p.memo || '', address: p.address || ''
  }));
  localStorage.setItem('travelPins', JSON.stringify(data));
}
function saveToStorage(){ saveToStorageLocal(); queueCloudSync(); }
 
function loadFromStorage(){
  const raw = localStorage.getItem('travelPins');
  if(!raw) return;
  let saved;
  try{ saved = JSON.parse(raw); } catch(e){ return; }
  saved.forEach(p=>{
    let categories = p.categories;
    if(!categories){
      categories = [];
      if(p.category) categories.push(p.category);
    }
    if(!categories.includes('before_visit') && !categories.includes('after_visit')){
      categories.push(p.visited ? 'after_visit' : 'before_visit');
    }
    const emoji = p.emoji || getDisplayEmoji(categories);
    const markers = createBothMarkers(p.id, p.lat, p.lng, !!p.visited, emoji);
    places.push({ ...p, categories, emoji, overlay: markers.overlay, gMarker: markers.gMarker });
    if(p.id >= idSeq) idSeq = p.id + 1;
  });
}

let dragState = null; // { type:'category'|'group', key }
const catRowEl = document.getElementById('catRow');
 
catRowEl.addEventListener('dragstart', (e)=>{
  const catSrc = e.target.closest('[data-drag-source]');
  if(catSrc){ dragState = { type:'category', key: catSrc.dataset.dragSource }; return; }
  const grpSrc = e.target.closest('[data-drag-group-source]');
  if(grpSrc){ dragState = { type:'group', key: grpSrc.dataset.dragGroupSource }; return; }
});
catRowEl.addEventListener('dragover', (e)=>{
  if(!dragState) return;
  if(dragState.type === 'category' && e.target.closest('.catListItem[data-cat]')) e.preventDefault();
  if(dragState.type === 'group' && e.target.closest('.groupHeader[data-group]')) e.preventDefault();
});
catRowEl.addEventListener('drop', (e)=>{
  if(!dragState) return;
  e.preventDefault();
  if(dragState.type === 'category'){
    const targetEl = e.target.closest('.catListItem[data-cat]');
    if(targetEl){
      const targetKey = targetEl.dataset.cat;
      const draggedInfo = CAT_INFO[dragState.key];
      const targetInfo = CAT_INFO[targetKey];
      if(targetKey !== dragState.key && draggedInfo && targetInfo && (draggedInfo.groupId || null) === (targetInfo.groupId || null)){
        reorderCategoryWithin(draggedInfo.groupId || null, dragState.key, targetKey);
      }
    }
  } else if(dragState.type === 'group'){
    const targetEl = e.target.closest('.groupHeader[data-group]');
    if(targetEl && targetEl.dataset.group && targetEl.dataset.group !== dragState.key){
      reorderGroups(dragState.key, targetEl.dataset.group);
    }
  }
  dragState = null;
  renderCatRow();
});
catRowEl.addEventListener('dragend', ()=>{ dragState = null; });
 
function reorderCategoryWithin(groupId, draggedKey, targetKey){
  const bucketPred = k => CAT_INFO[k] && (CAT_INFO[k].groupId || null) === groupId;
  const bucketKeys = customCategoryOrder.filter(bucketPred);
  const filtered = bucketKeys.filter(k => k !== draggedKey);
  const idx = filtered.indexOf(targetKey);
  const insertIdx = idx === -1 ? filtered.length : idx;
  filtered.splice(insertIdx, 0, draggedKey);
  let bi = 0;
  customCategoryOrder = customCategoryOrder.map(k => bucketPred(k) ? filtered[bi++] : k);
  saveCategoryOrder();
  recomputeAllEmojis();
  applyMapFilter();
}
 
function reorderGroups(draggedGid, targetGid){
  const filtered = groupOrder.filter(g => g !== draggedGid);
  const idx = filtered.indexOf(targetGid);
  const insertIdx = idx === -1 ? filtered.length : idx;
  filtered.splice(insertIdx, 0, draggedGid);
  groupOrder = filtered;
  saveGroupOrder();
}

/* ---------- 사이드바 너비 드래그 조절 ---------- */
(function initSidebarResize(){
  const handle = document.getElementById('sidebarResizeHandle');
  const MIN_W = 260, MAX_W = 560;
 
  const savedWidth = localStorage.getItem('sidebarWidth');
  if(savedWidth){
    document.documentElement.style.setProperty('--sidebar-width', savedWidth + 'px');
  }
 
  let dragging = false;
 
  function onMove(clientX){
    let w = clientX;
    if(w < MIN_W) w = MIN_W;
    if(w > MAX_W) w = MAX_W;
    document.documentElement.style.setProperty('--sidebar-width', w + 'px');
  }
  function endDrag(){
    if(!dragging) return;
    dragging = false;
    sidebarEl.classList.remove('resizing');
    handle.classList.remove('active');
    const finalWidth = getComputedStyle(document.documentElement).getPropertyValue('--sidebar-width').trim();
    localStorage.setItem('sidebarWidth', parseInt(finalWidth, 10));
    if(map) map.relayout();
    if(googleMap) google.maps.event.trigger(googleMap, 'resize');
  }
 
  handle.addEventListener('mousedown', (e)=>{
    dragging = true;
    sidebarEl.classList.add('resizing');
    handle.classList.add('active');
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e)=>{
    if(!dragging) return;
    onMove(e.clientX);
  });
  document.addEventListener('mouseup', endDrag);
 
  handle.addEventListener('touchstart', (e)=>{
    dragging = true;
    sidebarEl.classList.add('resizing');
    handle.classList.add('active');
  }, { passive:true });
  document.addEventListener('touchmove', (e)=>{
    if(!dragging) return;
    onMove(e.touches[0].clientX);
  }, { passive:true });
  document.addEventListener('touchend', endDrag);
})();
 
/* ---------- 지도 핀 ---------- */
function getDisplayEmoji(categories){
  for(const key of customCategoryOrder){
    if(categories.includes(key) && CAT_INFO[key]) return CAT_INFO[key].emoji;
  }
  if(categories.includes('after_visit') && CAT_INFO.after_visit) return CAT_INFO.after_visit.emoji;
  if(CAT_INFO.before_visit) return CAT_INFO.before_visit.emoji;
  return '📍';
}
 
function makePinElement(id, visited, emoji){
  const div = document.createElement('div');
  div.className = 'footPin ' + (visited ? 'green' : 'orange');
  div.innerHTML = `<span>${emoji || '📍'}</span>`;
  div.addEventListener('click', ()=> openPinAction(id));
  div.addEventListener('mousedown', (e)=> e.stopPropagation());
  div.addEventListener('touchstart', (e)=> e.stopPropagation());
  return div;
}
 
function createOverlay(id, lat, lng, visited, emoji){
  return new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(lat, lng),
    content: makePinElement(id, visited, emoji),
    yAnchor: 1,
    xAnchor: 0.5,
    map: map
  });
}
 
function makeGoogleIcon(visited){
  return {
    path: google.maps.SymbolPath.CIRCLE,
    scale: 13,
    fillColor: visited ? '#14B24E' : '#FFC53D',
    fillOpacity: 1,
    strokeColor: '#ffffff',
    strokeWeight: 2
  };
}
 
function createGoogleMarker(id, lat, lng, visited, emoji){
  if(!window.__gmapsReady || !googleMap) return null;
  const marker = new google.maps.Marker({
    position: { lat, lng },
    map: googleMap,
    icon: makeGoogleIcon(visited),
    label: { text: emoji || '📍', fontSize: '13px' }
  });
  marker.addListener('click', ()=> openPinAction(id));
  return marker;
}
 
// 카카오맵 + 구글맵 마커를 동시에 만듦 (구글이 아직 준비 안 됐으면 나중에 채워짐)
function createBothMarkers(id, lat, lng, visited, emoji){
  const overlay = createOverlay(id, lat, lng, visited, emoji);
  const gMarker = createGoogleMarker(id, lat, lng, visited, emoji);
  return { overlay, gMarker };
}
 
// 구글 지도가 뒤늦게 준비됐을 때, 마커가 없는 장소들에 구글 마커를 채워넣음
function ensureGoogleMarkers(){
  if(!window.__gmapsReady || !googleMap) return;
  places.forEach(p=>{
    if(!p.gMarker){
      p.gMarker = createGoogleMarker(p.id, p.lat, p.lng, p.visited, p.emoji);
    }
  });
  applyMapFilter();
}
 
function updateMarkerVisuals(p){
  p.overlay.setContent(makePinElement(p.id, p.visited, p.emoji));
  if(p.gMarker){
    p.gMarker.setIcon(makeGoogleIcon(p.visited));
    p.gMarker.setLabel({ text: p.emoji || '📍', fontSize: '13px' });
  }
}
 
// 선택된 카테고리에 따라 지도에 보이는 핀과 이모지를 다르게 표시
function applyMapFilter(){
  const groupCatKeys = selectedGroup
    ? customCategoryOrder.filter(k => CAT_INFO[k] && CAT_INFO[k].groupId === selectedGroup)
    : null;
 
  places.forEach(p=>{
    let visible, emojiToShow;
    if(selectedCat){
      visible = p.categories.includes(selectedCat);
      emojiToShow = (CAT_INFO[selectedCat] && CAT_INFO[selectedCat].emoji) || p.emoji;
    } else if(selectedGroup){
      visible = p.categories.some(c => groupCatKeys.includes(c));
      emojiToShow = getDisplayEmoji(p.categories);
    } else {
      visible = true;
      emojiToShow = getDisplayEmoji(p.categories);
    }
 
    if(visible){
      p.overlay.setContent(makePinElement(p.id, p.visited, emojiToShow));
      p.overlay.setMap(map);
    } else {
      p.overlay.setMap(null);
    }
 
    if(p.gMarker){
      if(visible){
        p.gMarker.setIcon(makeGoogleIcon(p.visited));
        p.gMarker.setLabel({ text: emojiToShow || '📍', fontSize: '13px' });
        p.gMarker.setMap(googleMap);
      } else {
        p.gMarker.setMap(null);
      }
    }
  });
}

/* ---------- 그룹별 접이식 카테고리 체크박스 목록 (공용) ---------- */
let pickCollapsed = {};
function buildPickListHtml(checkedKeys){
  let html = '';
  let any = false;
  groupOrder.forEach(gid=>{
    if(!GROUPS[gid]) return;
    const childKeys = customCategoryOrder.filter(k => CAT_INFO[k] && CAT_INFO[k].groupId === gid);
    if(childKeys.length === 0) return;
    any = true;
    const collapsed = !!pickCollapsed[gid];
    html += `<div class="pickGroupBlock">
      <div class="pickGroupHeader" data-pick-toggle="${gid}">
        <span class="groupArrow">${collapsed ? '▶' : '🔽'}</span>
        <span class="groupName">${escapeHtml(GROUPS[gid].name)}</span>
      </div>`;
    if(!collapsed){
      html += `<div class="pickGroupChildren">`;
      childKeys.forEach(k=>{
        const checked = checkedKeys.includes(k) ? 'checked' : '';
        html += `<label class="catPickRow"><input type="checkbox" value="${k}" ${checked}><span>${CAT_INFO[k].emoji} ${escapeHtml(CAT_INFO[k].label)}</span></label>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });
  const ungrouped = customCategoryOrder.filter(k => CAT_INFO[k] && !CAT_INFO[k].groupId);
  if(ungrouped.length > 0){
    any = true;
    html += `<div class="pickGroupBlock">
      <div class="pickGroupHeader ungroupedHeader">
        <span class="groupArrow"> </span><span class="groupName">미분류</span>
      </div>
      <div class="pickGroupChildren">`;
    ungrouped.forEach(k=>{
      const checked = checkedKeys.includes(k) ? 'checked' : '';
      html += `<label class="catPickRow"><input type="checkbox" value="${k}" ${checked}><span>${CAT_INFO[k].emoji} ${escapeHtml(CAT_INFO[k].label)}</span></label>`;
    });
    html += `</div></div>`;
  }
  if(!any){
    html = '<div class="emptyState" style="padding:6px 0;">아직 만든 카테고리가 없어요.</div>';
  }
  return html;
}
function getCheckedKeysFrom(containerId){
  return Array.from(document.querySelectorAll(`#${containerId} input[type=checkbox]:checked`)).map(el=>el.value);
}

  const p = places.find(x=>x.id===id);

function navigateToPlace(id){
  const p = places.find(x=>x.id===id);
  if(!p) return;
  if(activeProvider === 'kr' && map){
    map.setCenter(new kakao.maps.LatLng(p.lat, p.lng));
    map.setLevel(4);
  } else if(activeProvider === 'intl' && googleMap){
    googleMap.setCenter({ lat: p.lat, lng: p.lng });
    googleMap.setZoom(15);
  }

/* ---------- 장소 생성 ---------- */
function finalizePlace(name, categories, lat, lng, address){
  const emoji = getDisplayEmoji(categories);
  const visited = categories.includes('after_visit');
  const place = {
    id: idSeq++, name, categories, emoji,
    lat, lng, visited, memo:'', address: address || '', overlay:null, gMarker:null
  };
  const markers = createBothMarkers(place.id, lat, lng, visited, emoji);
  place.overlay = markers.overlay;
  place.gMarker = markers.gMarker;
  places.push(place);
  saveToStorage();
  renderPlaceList();
  applyMapFilter();
  return place;
}
 
/* ---------- 검색 ---------- */
let ps;
let previewMarkers = [];
let previewMarkersGoogle = [];
 
function clearPreviewMarkers(){
  previewMarkers.forEach(m => m.setMap(null));
  previewMarkers = [];
}
function clearPreviewMarkersGoogle(){
  previewMarkersGoogle.forEach(m => m.setMap(null));
  previewMarkersGoogle = [];
}
 
function doSearch(){
  const keyword = document.getElementById('searchInput').value.trim();
  const resultsEl = document.getElementById('searchResults');
  clearPreviewMarkers();
  clearPreviewMarkersGoogle();
  if(!keyword){ resultsEl.innerHTML = ''; return; }
  if(activeProvider === 'kr'){
    doSearchKakao(keyword, resultsEl);
  } else {
    doSearchGoogle(keyword, resultsEl);
  }
}
 
function doSearchKakao(keyword, resultsEl){
  if(!ps){ alert('지도가 아직 준비 중이에요. 잠시 후 다시 시도해주세요.'); return; }
  ps.keywordSearch(keyword, (data, status)=>{
    if(status !== kakao.maps.services.Status.OK){
      resultsEl.innerHTML = '<div class="searchEmpty">검색 결과가 없어요.</div>';
      window.__searchData = [];
      return;
    }
    window.__searchData = data;
    resultsEl.innerHTML = data.slice(0,6).map((d,i)=>`
      <div class="searchItem" onclick="selectSearchResult(${i})">
        <div class="searchName">${escapeHtml(d.place_name)}</div>
        <div class="searchAddr">${escapeHtml(d.road_address_name || d.address_name || '')}</div>
      </div>`).join('');
 
    const bounds = new kakao.maps.LatLngBounds();
    data.slice(0,6).forEach((d,i)=>{
      const pos = new kakao.maps.LatLng(parseFloat(d.y), parseFloat(d.x));
      const marker = new kakao.maps.Marker({ position: pos, map: map });
      kakao.maps.event.addListener(marker, 'click', ()=> selectSearchResult(i));
      previewMarkers.push(marker);
      bounds.extend(pos);
    });
    if(data.length > 0) map.setBounds(bounds);
  });
}
 
async function doSearchGoogle(keyword, resultsEl){
  if(!window.__gmapsReady || !googleMap){
    alert('구글 지도가 아직 준비 중이에요. 잠시 후 다시 시도해주세요.');
    return;
  }
  resultsEl.innerHTML = '<div class="searchEmpty">검색 중...</div>';
  try{
    const { Place } = await google.maps.importLibrary('places');
    const request = {
      textQuery: keyword,
      fields: ['displayName', 'location', 'formattedAddress'],
      locationBias: googleMap.getCenter(),
      maxResultCount: 6
    };
    const { places: results } = await Place.searchByText(request);
 
    if(!results || !results.length){
      resultsEl.innerHTML = '<div class="searchEmpty">검색 결과가 없어요.</div>';
      window.__searchData = [];
      return;
    }
    const mapped = results.map(r=>({
      place_name: r.displayName,
      road_address_name: r.formattedAddress || '',
      address_name: r.formattedAddress || '',
      y: r.location.lat(),
      x: r.location.lng()
    }));
    window.__searchData = mapped;
    resultsEl.innerHTML = mapped.map((d,i)=>`
      <div class="searchItem" onclick="selectSearchResult(${i})">
        <div class="searchName">${escapeHtml(d.place_name)}</div>
        <div class="searchAddr">${escapeHtml(d.road_address_name || d.address_name || '')}</div>
      </div>`).join('');
 
    const bounds = new google.maps.LatLngBounds();
    mapped.forEach((d,i)=>{
      const pos = { lat: d.y, lng: d.x };
      const marker = new google.maps.Marker({ position: pos, map: googleMap });
      marker.addListener('click', ()=> selectSearchResult(i));
      previewMarkersGoogle.push(marker);
      bounds.extend(pos);
    });
    googleMap.fitBounds(bounds);
  } catch(err){
    resultsEl.innerHTML = '<div class="searchEmpty">검색 중 오류가 발생했어요. 잠시 후 다시 시도해주세요.</div>';
    window.__searchData = [];
  }
}
 
function selectSearchResult(i){
  const d = window.__searchData[i];
  if(!d) return;
  pendingSearchResult = {
    name: d.place_name,
    lat: parseFloat(d.y),
    lng: parseFloat(d.x),
    address: d.road_address_name || d.address_name || ''
  };
  openCatPickModal();
}

});
document.getElementById('catPickCancelBtn').addEventListener('click', closeCatPickModal);
document.getElementById('catPickModal').addEventListener('click', (e)=>{
  if(e.target.id === 'catPickModal') closeCatPickModal();
});
 
/* ---------- 장소 삭제/메모 ---------- */
function removePlace(id){
  const idx = places.findIndex(x=>x.id===id);
  if(idx === -1) return;
  places[idx].overlay.setMap(null);
  if(places[idx].gMarker) places[idx].gMarker.setMap(null);
  places.splice(idx,1);
  saveToStorage();
  renderPlaceList();
}
 
function editMemo(id, value){
  const p = places.find(x=>x.id===id);
  if(!p) return;
  p.memo = value;
  saveToStorage();
}
 
/* ---------- 목록 렌더링 ---------- */
function renderBreadcrumb(){
  const breadcrumbEl = document.getElementById('detailBreadcrumb');
  if(!selectedCat || !CAT_INFO[selectedCat]){ breadcrumbEl.innerHTML = ''; return; }
  const info = CAT_INFO[selectedCat];
  let groupName = '목록';
  if(DEFAULT_KEYS.includes(selectedCat)) groupName = '기본';
  else if(info.groupId && GROUPS[info.groupId]) groupName = GROUPS[info.groupId].name;
  else groupName = '미분류';
  breadcrumbEl.innerHTML = `
    <div class="breadcrumbBack" id="breadcrumbBackBtn">← ${escapeHtml(groupName)}</div>
    <div class="breadcrumbCurrent"><span class="catEmoji">${info.emoji}</span>${escapeHtml(info.label)}</div>
  `;
}
document.getElementById('detailView').addEventListener('click', (e)=>{
  if(e.target.closest('#breadcrumbBackBtn')) goBackToBrowse();
});
 
function showBrowseView(){
  sidebarView = 'browse';
  document.getElementById('browseView').style.display = 'flex';
  document.getElementById('detailView').style.display = 'none';
}
function showDetailView(){
  sidebarView = 'detail';
  document.getElementById('browseView').style.display = 'none';
  document.getElementById('detailView').style.display = 'flex';
}
function goBackToBrowse(){
  selectedCat = null;
  showBrowseView();
  applyMapFilter();
}
 
function renderPlaceList(){
  renderBreadcrumb();
 
  if(!selectedCat){
    countText.textContent = '0';
    listEl.innerHTML = '';
    return;
  }
  const query = (localFilterInput.value || '').trim().toLowerCase();
  let filtered = places.filter(p => p.categories.includes(selectedCat));
  if(query) filtered = filtered.filter(p => p.name.toLowerCase().includes(query));
 
  countText.textContent = filtered.length;
  if(filtered.length === 0){
    listEl.innerHTML = query
      ? '<div class="emptyState">검색과 일치하는 장소가 없어요.</div>'
      : '<div class="emptyState">이 카테고리에 담긴 장소가 없어요.<br>목록으로 돌아가 검색해서 추가해보세요 🔎</div>';
    return;
  }
  listEl.innerHTML = filtered.map(p=>{
    const badges = p.categories
      .map(ck => CAT_INFO[ck] ? `<span class="miniCatBadge">${CAT_INFO[ck].emoji} ${escapeHtml(CAT_INFO[ck].label)}</span>` : '')
      .join('');
    return `
    <div class="placeCard ${p.visited ? 'visited':''}">
      <div class="pinIcon" onclick="openPinAction(${p.id})" title="방문/삭제">${p.emoji}</div>
      <div class="cardBody">
        <div class="cardNameArea" onclick="navigateToPlace(${p.id})" title="지도에서 보기">
          <div class="cardName">${escapeHtml(p.name)}</div>
          <div class="cardMeta">${p.visited ? '✅ ' : ''}${escapeHtml(p.address || '주소 정보 없음')}</div>
        </div>
        <div class="cardCatBadges">${badges}</div>
        <textarea class="memoBox" placeholder="메모 남기기"
          onchange="editMemo(${p.id}, this.value)">${escapeHtml(p.memo || '')}</textarea>
      </div>
      <button class="delBtn" onclick="removePlace(${p.id})" title="삭제">✕</button>
    </div>`;
  }).join('');
}
 
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
 
async function initData(){
  document.getElementById('catRow').innerHTML = '<div class="emptyState" style="padding:20px 0;">☁️ 데이터 불러오는 중...</div>';
 
  let cloud = null;
  try{ cloud = await fetchCloudState(); } catch(e){ cloud = null; }
 
  if(cloud){
    CAT_INFO = cloud.categories || {};
    if(!CAT_INFO.before_visit) CAT_INFO.before_visit = { emoji:'📍', label:'방문 전', memo:'' };
    if(!CAT_INFO.after_visit) CAT_INFO.after_visit = { emoji:'✅', label:'방문 후', memo:'' };
    customCategoryOrder = cloud.categoryOrder || Object.keys(CAT_INFO).filter(k => !DEFAULT_KEYS.includes(k));
    GROUPS = cloud.groups || {};
    groupOrder = cloud.groupOrder || Object.keys(GROUPS);
    saveCategoriesLocal();
    saveCategoryOrderLocal();
    saveGroupsLocal();
    saveGroupOrderLocal();
 
    places = [];
    (cloud.places || []).forEach(p=>{
      let categories = p.categories || [];
      if(!categories.includes('before_visit') && !categories.includes('after_visit')){
        categories = [...categories, p.visited ? 'after_visit' : 'before_visit'];
      }
      const overlay = createOverlay(p.id, p.lat, p.lng, !!p.visited, p.emoji);
      const gMarker = createGoogleMarker(p.id, p.lat, p.lng, !!p.visited, p.emoji);
      places.push({ ...p, categories, overlay, gMarker });
      if(p.id >= idSeq) idSeq = p.id + 1;
    });
    saveToStorageLocal();
  } else {
    // 클라우드에 데이터가 없거나 오프라인 → 이 기기에 저장된 내용으로 시작하고, 온라인이면 클라우드로 올려줌
    loadCategories();
    loadCategoryOrder();
    loadGroups();
    loadGroupOrder();
    loadFromStorage();
    queueCloudSync();
  }
 
  renderCatRow();
  renderPlaceList();
  applyMapFilter();
}
 
/* ---------- 국내/해외 지도 전환 ---------- */
function switchProvider(provider){
  if(provider === activeProvider) return;
  activeProvider = provider;
  document.getElementById('btnProviderKr').classList.toggle('active', provider === 'kr');
  document.getElementById('btnProviderIntl').classList.toggle('active', provider === 'intl');
  document.getElementById('map').style.display = (provider === 'kr') ? 'block' : 'none';
  document.getElementById('mapGoogle').style.display = (provider === 'intl') ? 'block' : 'none';
 
  // 검색 상태 초기화 (지도가 바뀌면 이전 검색 결과는 의미 없음)
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('searchInput').value = '';
  clearPreviewMarkers();
  clearPreviewMarkersGoogle();
 
  if(provider === 'kr'){
    setTimeout(()=>{ if(map) map.relayout(); }, 50);
  } else {
    if(!window.__gmapsReady){
      document.getElementById('mapGoogle').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#7C7264;font-size:13px;">🌍 구글 지도를 불러오는 중이에요...</div>';
      onGoogleMapsReady(()=>{
        if(activeProvider === 'intl'){
          document.getElementById('mapGoogle').innerHTML = '';
          initGoogleMapInstance();
          setTimeout(()=>{ if(googleMap) google.maps.event.trigger(googleMap, 'resize'); }, 50);
        }
      });
      return;
    }
    if(!googleMap){
      initGoogleMapInstance();
    }
    ensureGoogleMarkers();
    setTimeout(()=>{ if(googleMap) google.maps.event.trigger(googleMap, 'resize'); }, 50);
  }
}
document.getElementById('btnProviderKr').addEventListener('click', ()=> switchProvider('kr'));
document.getElementById('btnProviderIntl').addEventListener('click', ()=> switchProvider('intl'));
 
function initGoogleMapInstance(){
  const container = document.getElementById('mapGoogle');
  googleMap = new google.maps.Map(container, {
    center: { lat: 48.8566, lng: 2.3522 }, // 기본값: 파리 (해외 여행 느낌으로)
    zoom: 5,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false
  });
  ensureGoogleMarkers();
}
onGoogleMapsReady(function(){ /* SDK만 준비, 실제 지도 생성은 '해외' 탭을 처음 누를 때 */ });
 
kakao.maps.load(function(){
  const container = document.getElementById('map');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 7
  });
  map.setZoomable(true);
  ps = new kakao.maps.services.Places();
 
  initData();
 
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos => {
        map.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
        map.setLevel(5);
      },
      () => {}
    );
  }
});
 
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
