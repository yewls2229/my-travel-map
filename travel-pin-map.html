<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TraveLog</title>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=bbcf39840e4999a45a371a2c7a7bf4d5&autoload=false&libraries=services"></script>
<style>
  :root{
    --ink: #1F3D3A;
    --parchment: #F6F1E7;
    --green: #14B24E;
    --pin-yellow: #FFC53D;
    --gold: #C9A15A;
    --line: #E4DFD2;
    --text-soft: #7C7264;
    --sb-bg: #FFFFFF;
    --sb-input: #F5F3ED;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--parchment);color:var(--ink);}
  #app{display:flex;height:100vh;overflow:hidden;position:relative;}
 
  /* ---------- Sidebar ---------- */
  #sidebar{
    width:340px;min-width:340px;
    background:var(--sb-bg);
    color:var(--ink);
    display:flex;flex-direction:column;
    height:100%;
    border-right:1px solid var(--line);
    transition: width .25s ease, min-width .25s ease;
    overflow:hidden;
  }
  #sidebar.collapsed{ width:0; min-width:0; border-right:none; }
  #sidebarInner{ width:340px; height:100%; display:flex; flex-direction:column; flex-shrink:0; }
 
  #toggleSidebarBtn{
    position:absolute; top:18px; left:16px; z-index:1000;
    width:32px;height:32px;border-radius:50%;
    background:var(--sb-bg);color:var(--ink);border:1px solid var(--line);
    cursor:pointer;font-size:15px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
  }
  #toggleSidebarBtn:hover{border-color:var(--gold);}
  #brand{
    padding:22px 20px 14px 58px;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  #brand h1{
    font-family:Georgia,'Times New Roman',serif;
    font-size:26px;margin:0 0 4px 0;letter-spacing:0.5px;font-weight:600;color:var(--ink);
  }
  #brand p{margin:0;font-size:12.5px;color:var(--text-soft);line-height:1.5;}
 
  #addForm{
    padding:14px 20px;
    border-bottom:1px solid var(--line);
    display:flex;flex-direction:column;gap:8px;
    flex-shrink:0;
  }
  #addForm .hint{
    font-size:12px;color:var(--text-soft);background:var(--sb-input);
    padding:8px 10px;border-radius:6px;line-height:1.5;
  }
  #addForm input[type=text]{
    background:var(--sb-input);
    border:1px solid var(--line);
    color:var(--ink);
    padding:9px 10px;border-radius:6px;font-size:13.5px;outline:none;
    width:100%;
  }
  #addForm input[type=text]::placeholder{color:#a8a091;}
  #addForm input[type=text]:focus{border-color:var(--gold);}
 
  /* ---------- Category list ---------- */
  .catList{display:flex;flex-direction:column;gap:6px;max-height:230px;overflow-y:auto;padding-right:2px;}
  .catListItem{
    border:1px solid var(--line);border-radius:8px;background:var(--sb-input);
  }
  .catListItem.active{border-color:var(--gold);}
  .catMain{
    display:flex;align-items:center;gap:8px;padding:10px;cursor:pointer;
    line-height:1.4;border-radius:8px 8px 0 0;min-height:20px;
  }
  .catListItem.active .catMain{background:var(--gold);color:#fff;}
  .catMain.noMemo{border-radius:8px;}
  .catEmoji{
    font-size:17px;flex-shrink:0;line-height:1;
    font-family:'Segoe UI Emoji','Noto Color Emoji','Apple Color Emoji',sans-serif;
  }
  .catLabel{font-size:13px;font-weight:600;line-height:1.4;word-break:break-word;}
  .catCtrls{display:flex;gap:2px;margin-left:auto;flex-shrink:0;}
  .catCtrlBtn{background:none;border:none;cursor:pointer;font-size:11px;color:inherit;opacity:0.75;padding:2px 4px;}
  .catCtrlBtn:hover{opacity:1;}
  .catDel:hover{color:#E2723A;}
  .catBadge{margin-left:auto;font-size:10px;background:rgba(0,0,0,0.08);padding:2px 7px;border-radius:10px;color:var(--text-soft);flex-shrink:0;}
  .catListItem.active .catBadge{background:rgba(255,255,255,0.25);color:#fff;}
  .catMemoBox{
    width:100%;display:block;border:none;border-top:1px solid var(--line);
    background:transparent;color:var(--ink);font-size:11.5px;padding:6px 10px;
    resize:vertical;min-height:24px;font-family:inherit;border-radius:0 0 8px 8px;
  }
  .catMemoBox::placeholder{color:#a8a091;}
  .catMemoBox:focus{outline:none;background:#fff;}
  .addCatRow .catMain{color:var(--text-soft);border-style:dashed;}
  .addCatRow{border-style:dashed;}
  .addCatRow .catMain:hover{color:var(--ink);}
 
  .searchRow{display:flex;gap:6px;}
  .searchRow input{flex:1;}
  .searchRow button{
    background:var(--gold);border:none;color:#fff;
    border-radius:6px;padding:0 12px;cursor:pointer;font-size:14px;
  }
  .searchRow button:hover{background:#b98d45;}
  #searchResults{display:flex;flex-direction:column;gap:4px;}
  .searchItem{
    background:var(--sb-input);border:1px solid var(--line);
    border-radius:6px;padding:6px 8px;cursor:pointer;
  }
  .searchItem:hover{border-color:var(--gold);background:#EFE9D8;}
  .searchName{font-size:12.5px;font-weight:600;}
  .searchAddr{font-size:10.5px;color:var(--text-soft);margin-top:1px;}
  .searchEmpty{font-size:12px;color:var(--text-soft);padding:4px 2px;}
 
  /* ---------- List ---------- */
  #listHeader{
    padding:12px 20px 8px 20px;font-size:12px;
    color:var(--text-soft);flex-shrink:0;
    display:flex;flex-direction:column;gap:8px;
  }
  #listHeader b{color:var(--ink);}
  #localFilterInput{
    width:100%;background:var(--sb-input);border:1px solid var(--line);
    color:var(--ink);padding:7px 9px;border-radius:6px;font-size:12.5px;outline:none;
  }
  #localFilterInput::placeholder{color:#a8a091;}
  #localFilterInput:focus{border-color:var(--gold);}
  #list{flex:1;overflow-y:auto;padding:4px 12px 20px 12px;}
  .placeCard{
    background:#FCFBF8;
    border:1px solid var(--line);
    border-radius:8px;padding:10px 12px;margin-bottom:8px;
    display:flex;align-items:flex-start;gap:10px;
  }
  .placeCard.visited{opacity:0.65;}
  .pinIcon{font-size:18px;flex-shrink:0;margin-top:1px;cursor:pointer;font-family:'Segoe UI Emoji','Noto Color Emoji','Apple Color Emoji',sans-serif;}
  .cardBody{flex:1;min-width:0;}
  .cardNameArea{cursor:pointer;}
  .cardNameArea:hover .cardName{color:var(--gold);}
  .cardName{font-size:14px;font-weight:600;color:var(--ink);word-break:break-word;}
  .cardMeta{font-size:11px;color:var(--text-soft);margin-top:2px;}
  .memoBox{
    width:100%;margin-top:6px;background:var(--sb-input);
    border:1px solid var(--line);border-radius:5px;
    color:var(--ink);font-size:12px;padding:5px 7px;
    resize:vertical;min-height:28px;font-family:inherit;
  }
  .memoBox::placeholder{color:#a8a091;}
  .memoBox:focus{outline:none;border-color:var(--gold);}
  .delBtn{background:none;border:none;color:#b08a72;cursor:pointer;font-size:14px;flex-shrink:0;}
  .delBtn:hover{color:#E2723A;}
  .emptyState{color:var(--text-soft);font-size:12.5px;text-align:center;padding:30px 10px;line-height:1.6;}
 
  /* ---------- Map ---------- */
  #map{flex:1;height:100%;}
  .footPin{
    width:30px;height:30px;border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.35);
    border:2px solid rgba(255,255,255,0.9);
    cursor:pointer;
  }
  .footPin span{transform:rotate(45deg);font-size:14px;font-family:'Segoe UI Emoji','Noto Color Emoji','Apple Color Emoji',sans-serif;}
  .footPin.orange{background:var(--pin-yellow);}
  .footPin.green{background:var(--green);}
 
  /* ---------- Modals ---------- */
  .modalOverlay{
    display:none;position:fixed;inset:0;background:rgba(31,61,58,0.45);
    z-index:2000;align-items:center;justify-content:center;
  }
  .modalBox{
    background:#fff;border-radius:12px;padding:18px;width:270px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
  }
  .modalTitle{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:12px;text-align:center;word-break:break-word;}
  .modalBtn{
    width:100%;padding:10px;border-radius:8px;border:none;font-size:13.5px;
    margin-bottom:8px;cursor:pointer;font-weight:600;
  }
  .visitBtn{background:var(--green);color:#fff;}
  .visitBtn:hover{background:#0f9640;}
  .deleteBtn{background:#F4DED6;color:#b3401f;}
  .deleteBtn:hover{background:#eecabd;}
  .cancelBtn{background:var(--sb-input);color:var(--text-soft);margin-bottom:0;}
  .cancelBtn:hover{background:#e9e4d8;}
  .catPickRow{display:flex;align-items:center;gap:8px;padding:7px 2px;font-size:13px;cursor:pointer;}
  .catPickRow input{width:16px;height:16px;cursor:pointer;}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebarInner">
    <div id="brand">
      <h1>TraveLog</h1>
      <p>카테고리를 만들고, 장소를 검색해서 담아보세요. 지도의 핀을 누르면 방문/삭제를 고를 수 있어요.</p>
    </div>
 
    <div id="addForm">
      <div class="hint" id="hintText">① 카테고리 만들기 → ② 장소 검색 → ③ 담을 카테고리 체크</div>
      <div class="catList" id="catRow"></div>
 
      <div class="searchRow">
        <input type="text" id="searchInput" placeholder="🔎 장소 검색 (예: 서울역)" />
        <button id="searchBtn" type="button">검색</button>
      </div>
      <div id="searchResults"></div>
    </div>
 
    <div id="listHeader">
      <div>선택한 카테고리: <b id="activeCatLabel">없음</b> · <span id="countText">0</span>개</div>
      <input type="text" id="localFilterInput" placeholder="🔍 이 카테고리에서 검색" />
    </div>
    <div id="list"></div>
    </div>
  </div>
  <button id="toggleSidebarBtn" title="사이드바 접기/펼치기">☰</button>
  <div id="map"></div>
</div>
 
<div class="modalOverlay" id="pinActionModal">
  <div class="modalBox">
    <div class="modalTitle" id="modalTitle"></div>
    <button class="modalBtn visitBtn" id="modalVisitBtn"></button>
    <button class="modalBtn deleteBtn" id="modalDeleteBtn">삭제하기</button>
    <button class="modalBtn cancelBtn" id="modalCancelBtn">취소</button>
  </div>
</div>
 
<div class="modalOverlay" id="catPickModal">
  <div class="modalBox">
    <div class="modalTitle" id="catPickTitle"></div>
    <div id="catPickList" style="margin-bottom:12px;max-height:220px;overflow-y:auto;"></div>
    <button class="modalBtn visitBtn" id="catPickConfirmBtn">추가하기</button>
    <button class="modalBtn cancelBtn" id="catPickCancelBtn">취소</button>
  </div>
</div>
 
<script>
const SUPABASE_URL = 'https://hladgocnwkdobcsxcmqk.supabase.co';
const SUPABASE_KEY = 'sb_publishable__FWBn_--TTx2JgOtuwqyEQ_cnyqW6tw';
 
const DEFAULT_KEYS = ['before_visit','after_visit'];
let CAT_INFO = {};             // { key: {emoji,label,memo} }
let customCategoryOrder = [];  // 커스텀 카테고리 우선순위 (지도 이모지 결정용)
let places = [];               // {id, name, categories:[], emoji, lat, lng, visited, memo, address, overlay}
let idSeq = 1;
let map;
let selectedCat = null;        // 목록 필터링용 (보기 전용)
let pinActionTargetId = null;
let pendingSearchResult = null;
 
/* ---------- 클라우드(Supabase) 동기화 ---------- */
let cloudSyncTimer = null;
function queueCloudSync(){
  clearTimeout(cloudSyncTimer);
  cloudSyncTimer = setTimeout(()=>{ pushCloudState().catch(()=>{}); }, 700);
}
 
async function pushCloudState(){
  const state = {
    categories: CAT_INFO,
    categoryOrder: customCategoryOrder,
    places: places.map(p => ({
      id: p.id, name: p.name, categories: p.categories,
      emoji: p.emoji, lat: p.lat, lng: p.lng, visited: p.visited,
      memo: p.memo || '', address: p.address || ''
    }))
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/travelog_state?on_conflict=id`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates'
    },
    body: JSON.stringify([{ id: 'main', data: state, updated_at: new Date().toISOString() }])
  });
  return res.ok;
}
 
async function fetchCloudState(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/travelog_state?id=eq.main&select=data`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if(!res.ok) return null;
  const rows = await res.json();
  if(!rows.length) return null;
  return rows[0].data;
}
 
/* ---------- 카테고리 저장/불러오기 (로컬) ---------- */
function loadCategories(){
  const raw = localStorage.getItem('categories');
  if(raw){
    try{ CAT_INFO = JSON.parse(raw); } catch(e){ CAT_INFO = {}; }
  }
  // 기존 데이터에 기본 카테고리가 없으면 채워넣음 (신규/구버전 데이터 모두 대응)
  let needsSave = false;
  if(!CAT_INFO.before_visit){ CAT_INFO.before_visit = { emoji:'📍', label:'방문 전', memo:'' }; needsSave = true; }
  if(!CAT_INFO.after_visit){ CAT_INFO.after_visit = { emoji:'✅', label:'방문 후', memo:'' }; needsSave = true; }
  if(needsSave) saveCategories();
}
function saveCategoriesLocal(){ localStorage.setItem('categories', JSON.stringify(CAT_INFO)); }
function saveCategories(){ saveCategoriesLocal(); queueCloudSync(); }
 
function loadCategoryOrder(){
  const raw = localStorage.getItem('categoryOrder');
  if(raw){ try{ customCategoryOrder = JSON.parse(raw); return; } catch(e){} }
  customCategoryOrder = Object.keys(CAT_INFO).filter(k => !DEFAULT_KEYS.includes(k));
  saveCategoryOrder();
}
function saveCategoryOrderLocal(){ localStorage.setItem('categoryOrder', JSON.stringify(customCategoryOrder)); }
function saveCategoryOrder(){ saveCategoryOrderLocal(); queueCloudSync(); }
 
/* ---------- 장소 저장/불러오기 (로컬) ---------- */
function saveToStorageLocal(){
  const data = places.map(p => ({
    id: p.id, name: p.name, categories: p.categories,
    emoji: p.emoji, lat: p.lat, lng: p.lng, visited: p.visited,
    memo: p.memo || '', address: p.address || ''
  }));
  localStorage.setItem('travelPins', JSON.stringify(data));
}
function saveToStorage(){ saveToStorageLocal(); queueCloudSync(); }
 
function loadFromStorage(){
  const raw = localStorage.getItem('travelPins');
  if(!raw) return;
  let saved;
  try{ saved = JSON.parse(raw); } catch(e){ return; }
  saved.forEach(p=>{
    let categories = p.categories;
    if(!categories){
      categories = [];
      if(p.category) categories.push(p.category);
    }
    if(!categories.includes('before_visit') && !categories.includes('after_visit')){
      categories.push(p.visited ? 'after_visit' : 'before_visit');
    }
    const emoji = p.emoji || getDisplayEmoji(categories);
    const overlay = createOverlay(p.id, p.lat, p.lng, !!p.visited, emoji);
    places.push({ ...p, categories, emoji, overlay });
    if(p.id >= idSeq) idSeq = p.id + 1;
  });
}
 
const listEl = document.getElementById('list');
const countText = document.getElementById('countText');
const activeCatLabel = document.getElementById('activeCatLabel');
const localFilterInput = document.getElementById('localFilterInput');
 
/* ---------- 카테고리 UI ---------- */
function catRowHtml(key){
  const info = CAT_INFO[key];
  const isDefault = DEFAULT_KEYS.includes(key);
  const active = key === selectedCat ? ' active' : '';
  const controls = isDefault
    ? `<span class="catBadge">기본</span>`
    : `<div class="catCtrls">
         <button class="catCtrlBtn" data-move="${key}" data-dir="-1" title="위로">▲</button>
         <button class="catCtrlBtn" data-move="${key}" data-dir="1" title="아래로">▼</button>
         <button class="catCtrlBtn catDel" data-del="${key}" title="삭제">✕</button>
       </div>`;
  const memoBox = isDefault ? '' : `<textarea class="catMemoBox" placeholder="메모 남기기" data-catmemo="${key}">${escapeHtml(info.memo || '')}</textarea>`;
  return `<div class="catListItem${active}" data-cat="${key}">
    <div class="catMain${isDefault ? ' noMemo' : ''}" data-select="${key}">
      <span class="catEmoji">${info.emoji}</span>
      <span class="catLabel">${escapeHtml(info.label)}</span>
      ${controls}
    </div>
    ${memoBox}
  </div>`;
}
 
function renderCatRow(){
  let html = '';
  html += catRowHtml('before_visit');
  html += catRowHtml('after_visit');
  customCategoryOrder.forEach(k=>{ if(CAT_INFO[k]) html += catRowHtml(k); });
  html += `<div class="catListItem addCatRow" id="addCatBtn"><div class="catMain"><span class="catEmoji">➕</span><span class="catLabel">카테고리 추가</span></div></div>`;
  document.getElementById('catRow').innerHTML = html;
}
 
function addNewCategory(){
  const label = prompt('새 카테고리 이름을 입력하세요 (예: 카페, 서울여행)');
  if(!label || !label.trim()) return;
  const emoji = prompt('이 카테고리에 쓸 기본 이모티콘을 입력하세요', '📍');
  if(!emoji || !emoji.trim()) return;
  const key = 'cat_' + Date.now();
  CAT_INFO[key] = { emoji: emoji.trim(), label: label.trim(), memo: '' };
  customCategoryOrder.push(key);
  saveCategories();
  saveCategoryOrder();
  selectCategory(key);
}
 
function deleteCategory(key){
  if(DEFAULT_KEYS.includes(key)) return;
  const info = CAT_INFO[key];
  if(!info) return;
  if(!confirm(`"${info.label}" 카테고리를 삭제할까요?\n이 카테고리에 담긴 장소도 함께 삭제돼요.`)) return;
  places.filter(p => p.categories.includes(key)).forEach(p => p.overlay.setMap(null));
  places = places.filter(p => !p.categories.includes(key));
  delete CAT_INFO[key];
  customCategoryOrder = customCategoryOrder.filter(k => k !== key);
  saveCategories();
  saveCategoryOrder();
  saveToStorage();
  if(selectedCat === key) selectedCat = null;
  renderCatRow();
  renderPlaceList();
}
 
function moveCategory(key, dir){
  const idx = customCategoryOrder.indexOf(key);
  const newIdx = idx + dir;
  if(idx === -1 || newIdx < 0 || newIdx >= customCategoryOrder.length) return;
  [customCategoryOrder[idx], customCategoryOrder[newIdx]] = [customCategoryOrder[newIdx], customCategoryOrder[idx]];
  saveCategoryOrder();
  renderCatRow();
  refreshAllPinEmojis();
}
 
function refreshAllPinEmojis(){
  let changed = false;
  places.forEach(p=>{
    const newEmoji = getDisplayEmoji(p.categories);
    if(newEmoji !== p.emoji){
      p.emoji = newEmoji;
      p.overlay.setContent(makePinElement(p.id, p.visited, p.emoji));
      changed = true;
    }
  });
  if(changed){ saveToStorage(); renderPlaceList(); }
}
 
function selectCategory(key){
  selectedCat = key;
  localFilterInput.value = '';
  renderCatRow();
  renderPlaceList();
}
 
function editCategoryMemo(key, value){
  if(!CAT_INFO[key]) return;
  CAT_INFO[key].memo = value;
  saveCategories();
}
 
document.getElementById('catRow').addEventListener('click', (e)=>{
  if(e.target.closest('#addCatBtn')){ addNewCategory(); return; }
  const delBtn = e.target.closest('[data-del]');
  if(delBtn){ deleteCategory(delBtn.dataset.del); return; }
  const moveBtn = e.target.closest('[data-move]');
  if(moveBtn){ moveCategory(moveBtn.dataset.move, parseInt(moveBtn.dataset.dir, 10)); return; }
  const main = e.target.closest('[data-select]');
  if(main){ selectCategory(main.dataset.select); }
});
document.getElementById('catRow').addEventListener('change', (e)=>{
  const box = e.target.closest('[data-catmemo]');
  if(box){ editCategoryMemo(box.dataset.catmemo, box.value); }
});
 
document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){ e.preventDefault(); doSearch(); }
});
localFilterInput.addEventListener('input', renderPlaceList);
 
const toggleBtn = document.getElementById('toggleSidebarBtn');
const sidebarEl = document.getElementById('sidebar');
toggleBtn.addEventListener('click', ()=>{
  sidebarEl.classList.toggle('collapsed');
  setTimeout(()=>{ if(map) map.relayout(); }, 260);
});
 
/* ---------- 지도 핀 ---------- */
function getDisplayEmoji(categories){
  for(const key of customCategoryOrder){
    if(categories.includes(key) && CAT_INFO[key]) return CAT_INFO[key].emoji;
  }
  if(categories.includes('after_visit') && CAT_INFO.after_visit) return CAT_INFO.after_visit.emoji;
  if(CAT_INFO.before_visit) return CAT_INFO.before_visit.emoji;
  return '📍';
}
 
function makePinElement(id, visited, emoji){
  const div = document.createElement('div');
  div.className = 'footPin ' + (visited ? 'green' : 'orange');
  div.innerHTML = `<span>${emoji || '📍'}</span>`;
  div.addEventListener('click', ()=> openPinAction(id));
  div.addEventListener('mousedown', (e)=> e.stopPropagation());
  div.addEventListener('touchstart', (e)=> e.stopPropagation());
  return div;
}
 
function createOverlay(id, lat, lng, visited, emoji){
  return new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(lat, lng),
    content: makePinElement(id, visited, emoji),
    yAnchor: 1,
    xAnchor: 0.5,
    map: map
  });
}
 
/* ---------- 방문/삭제 선택 모달 ---------- */
function openPinAction(id){
  const p = places.find(x=>x.id===id);
  if(!p) return;
  pinActionTargetId = id;
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalVisitBtn').textContent = p.visited ? '미방문으로 되돌리기' : '✓ 방문완료로 표시';
  document.getElementById('pinActionModal').style.display = 'flex';
}
function closePinAction(){
  document.getElementById('pinActionModal').style.display = 'none';
  pinActionTargetId = null;
}
document.getElementById('modalVisitBtn').addEventListener('click', ()=>{
  const p = places.find(x=>x.id===pinActionTargetId);
  if(p){
    if(p.visited){
      p.categories = p.categories.filter(c => c !== 'after_visit');
      if(!p.categories.includes('before_visit')) p.categories.push('before_visit');
      p.visited = false;
    } else {
      p.categories = p.categories.filter(c => c !== 'before_visit');
      if(!p.categories.includes('after_visit')) p.categories.push('after_visit');
      p.visited = true;
    }
    p.emoji = getDisplayEmoji(p.categories);
    p.overlay.setContent(makePinElement(p.id, p.visited, p.emoji));
    saveToStorage();
    renderPlaceList();
  }
  closePinAction();
});
document.getElementById('modalDeleteBtn').addEventListener('click', ()=>{
  if(pinActionTargetId != null) removePlace(pinActionTargetId);
  closePinAction();
});
document.getElementById('modalCancelBtn').addEventListener('click', closePinAction);
document.getElementById('pinActionModal').addEventListener('click', (e)=>{
  if(e.target.id === 'pinActionModal') closePinAction();
});
 
function navigateToPlace(id){
  const p = places.find(x=>x.id===id);
  if(!p || !map) return;
  map.setCenter(new kakao.maps.LatLng(p.lat, p.lng));
  map.setLevel(4);
}
 
/* ---------- 장소 생성 ---------- */
function finalizePlace(name, categories, lat, lng, address){
  const emoji = getDisplayEmoji(categories);
  const visited = categories.includes('after_visit');
  const place = {
    id: idSeq++, name, categories, emoji,
    lat, lng, visited, memo:'', address: address || '', overlay:null
  };
  place.overlay = createOverlay(place.id, lat, lng, visited, emoji);
  places.push(place);
  saveToStorage();
  renderPlaceList();
  return place;
}
 
/* ---------- 검색 ---------- */
let ps;
let previewMarkers = [];
 
function clearPreviewMarkers(){
  previewMarkers.forEach(m => m.setMap(null));
  previewMarkers = [];
}
 
function doSearch(){
  const keyword = document.getElementById('searchInput').value.trim();
  const resultsEl = document.getElementById('searchResults');
  clearPreviewMarkers();
  if(!keyword){ resultsEl.innerHTML = ''; return; }
  if(!ps){ alert('지도가 아직 준비 중이에요. 잠시 후 다시 시도해주세요.'); return; }
  ps.keywordSearch(keyword, (data, status)=>{
    if(status !== kakao.maps.services.Status.OK){
      resultsEl.innerHTML = '<div class="searchEmpty">검색 결과가 없어요.</div>';
      window.__searchData = [];
      return;
    }
    window.__searchData = data;
    resultsEl.innerHTML = data.slice(0,6).map((d,i)=>`
      <div class="searchItem" onclick="selectSearchResult(${i})">
        <div class="searchName">${escapeHtml(d.place_name)}</div>
        <div class="searchAddr">${escapeHtml(d.road_address_name || d.address_name || '')}</div>
      </div>`).join('');
 
    const bounds = new kakao.maps.LatLngBounds();
    data.slice(0,6).forEach((d,i)=>{
      const pos = new kakao.maps.LatLng(parseFloat(d.y), parseFloat(d.x));
      const marker = new kakao.maps.Marker({ position: pos, map: map });
      kakao.maps.event.addListener(marker, 'click', ()=> selectSearchResult(i));
      previewMarkers.push(marker);
      bounds.extend(pos);
    });
    if(data.length > 0) map.setBounds(bounds);
  });
}
 
function selectSearchResult(i){
  const d = window.__searchData[i];
  if(!d) return;
  pendingSearchResult = {
    name: d.place_name,
    lat: parseFloat(d.y),
    lng: parseFloat(d.x),
    address: d.road_address_name || d.address_name || ''
  };
  openCatPickModal();
}
 
/* ---------- 담을 카테고리 선택 모달 ---------- */
function openCatPickModal(){
  document.getElementById('catPickTitle').textContent = pendingSearchResult.name;
  const listEl2 = document.getElementById('catPickList');
  if(customCategoryOrder.length === 0){
    listEl2.innerHTML = '<div class="emptyState" style="padding:6px 0;">아직 만든 카테고리가 없어요.<br>그래도 "방문 전"에는 자동으로 담겨요.</div>';
  } else {
    listEl2.innerHTML = customCategoryOrder.filter(k=>CAT_INFO[k]).map(k=>`
      <label class="catPickRow">
        <input type="checkbox" value="${k}">
        <span>${CAT_INFO[k].emoji} ${escapeHtml(CAT_INFO[k].label)}</span>
      </label>`).join('');
  }
  document.getElementById('catPickModal').style.display = 'flex';
}
function closeCatPickModal(){
  document.getElementById('catPickModal').style.display = 'none';
  pendingSearchResult = null;
  clearPreviewMarkers();
  document.getElementById('searchResults').innerHTML = '';
  document.getElementById('searchInput').value = '';
}
document.getElementById('catPickConfirmBtn').addEventListener('click', ()=>{
  if(!pendingSearchResult) return;
  const checked = Array.from(document.querySelectorAll('#catPickList input[type=checkbox]:checked')).map(el=>el.value);
  const categories = ['before_visit', ...checked];
  const { name, lat, lng, address } = pendingSearchResult;
  finalizePlace(name, categories, lat, lng, address);
  map.setCenter(new kakao.maps.LatLng(lat, lng));
  map.setLevel(4);
  closeCatPickModal();
});
document.getElementById('catPickCancelBtn').addEventListener('click', closeCatPickModal);
document.getElementById('catPickModal').addEventListener('click', (e)=>{
  if(e.target.id === 'catPickModal') closeCatPickModal();
});
 
/* ---------- 장소 삭제/메모 ---------- */
function removePlace(id){
  const idx = places.findIndex(x=>x.id===id);
  if(idx === -1) return;
  places[idx].overlay.setMap(null);
  places.splice(idx,1);
  saveToStorage();
  renderPlaceList();
}
 
function editMemo(id, value){
  const p = places.find(x=>x.id===id);
  if(!p) return;
  p.memo = value;
  saveToStorage();
}
 
/* ---------- 목록 렌더링 ---------- */
function renderPlaceList(){
  const label = (selectedCat && CAT_INFO[selectedCat]) ? CAT_INFO[selectedCat].label : '없음';
  activeCatLabel.textContent = label;
 
  if(!selectedCat){
    countText.textContent = '0';
    listEl.innerHTML = '<div class="emptyState">먼저 카테고리를 추가하거나 선택해주세요.</div>';
    return;
  }
  const query = (localFilterInput.value || '').trim().toLowerCase();
  let filtered = places.filter(p => p.categories.includes(selectedCat));
  if(query) filtered = filtered.filter(p => p.name.toLowerCase().includes(query));
 
  countText.textContent = filtered.length;
  if(filtered.length === 0){
    listEl.innerHTML = query
      ? '<div class="emptyState">검색과 일치하는 장소가 없어요.</div>'
      : '<div class="emptyState">이 카테고리에 담긴 장소가 없어요.<br>위에서 검색해서 추가해보세요 🔎</div>';
    return;
  }
  listEl.innerHTML = filtered.map(p=>`
    <div class="placeCard ${p.visited ? 'visited':''}">
      <div class="pinIcon" onclick="openPinAction(${p.id})" title="방문/삭제">${p.emoji}</div>
      <div class="cardBody">
        <div class="cardNameArea" onclick="navigateToPlace(${p.id})" title="지도에서 보기">
          <div class="cardName">${escapeHtml(p.name)}</div>
          <div class="cardMeta">${p.visited ? '✅ ' : ''}${escapeHtml(p.address || '주소 정보 없음')}</div>
        </div>
        <textarea class="memoBox" placeholder="메모 남기기"
          onchange="editMemo(${p.id}, this.value)">${escapeHtml(p.memo || '')}</textarea>
      </div>
      <button class="delBtn" onclick="removePlace(${p.id})" title="삭제">✕</button>
    </div>`).join('');
}
 
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
 
async function initData(){
  const hintEl = document.getElementById('hintText');
  hintEl.textContent = '☁️ 데이터 불러오는 중...';
 
  let cloud = null;
  try{ cloud = await fetchCloudState(); } catch(e){ cloud = null; }
 
  if(cloud){
    CAT_INFO = cloud.categories || {};
    if(!CAT_INFO.before_visit) CAT_INFO.before_visit = { emoji:'📍', label:'방문 전', memo:'' };
    if(!CAT_INFO.after_visit) CAT_INFO.after_visit = { emoji:'✅', label:'방문 후', memo:'' };
    customCategoryOrder = cloud.categoryOrder || Object.keys(CAT_INFO).filter(k => !DEFAULT_KEYS.includes(k));
    saveCategoriesLocal();
    saveCategoryOrderLocal();
 
    places = [];
    (cloud.places || []).forEach(p=>{
      let categories = p.categories || [];
      if(!categories.includes('before_visit') && !categories.includes('after_visit')){
        categories = [...categories, p.visited ? 'after_visit' : 'before_visit'];
      }
      const overlay = createOverlay(p.id, p.lat, p.lng, !!p.visited, p.emoji);
      places.push({ ...p, categories, overlay });
      if(p.id >= idSeq) idSeq = p.id + 1;
    });
    saveToStorageLocal();
  } else {
    // 클라우드에 데이터가 없거나 오프라인 → 이 기기에 저장된 내용으로 시작하고, 온라인이면 클라우드로 올려줌
    loadCategories();
    loadCategoryOrder();
    loadFromStorage();
    queueCloudSync();
  }
 
  hintEl.textContent = '① 카테고리 만들기 → ② 장소 검색 → ③ 담을 카테고리 체크';
  renderCatRow();
  renderPlaceList();
}
 
kakao.maps.load(function(){
  const container = document.getElementById('map');
  map = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(37.5665, 126.9780),
    level: 7
  });
  map.setZoomable(true);
  ps = new kakao.maps.services.Places();
 
  initData();
 
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos => {
        map.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude));
        map.setLevel(5);
      },
      () => {}
    );
  }
});
</script>
